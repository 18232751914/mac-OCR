<!--
  文件：index.html
  职责：应用 HTML 入口。挂载 #root 并加载 /src/main.tsx；运行时根据
        VITE_APP_NAME 覆盖 <title>；声明 favicon / manifest 等元信息。
  依赖：/src/main.tsx、/src/default.css（由入口引入）
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title will be overridden at runtime from VITE_APP_NAME if provided -->
    <title>App</title>
    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#2d89ef" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/favicon/180x180.png" />
    <link rel="mask-icon" href="/img/favicon/safari-pinned-tab.svg" color="#5bbad5" />
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon/32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon/16x16.png" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script type="module">
      // Ensure the page title reflects VITE_APP_NAME if provided
      const name = import.meta.env?.VITE_APP_NAME;
      if (name && typeof name === 'string') {
        document.title = name;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
  </body>
</html>
