name: Build and Release

on:
  push:
    tags:
      # 兼容大小写 tag：v0.0.1 / V0.0.1
      - '[vV]*'
  # 允许手动选择已有 tag 重新触发（修复历史 release 缺少 .dmg 时用）
  workflow_dispatch:
    inputs:
      tag:
        description: '要重新发布 assets 的 tag（例如 V0.0.1）'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: macos-latest
    # 构建产物 15 天过期，足够排查问题
    timeout-minutes: 60

    steps:
      - name: Show runner info
        run: |
          echo "macOS $(sw_vers -productVersion) · arch $(uname -m)"
          echo "runner: $(sysctl -n hw.ncpu) CPUs"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild electron binary
        run: pnpm rebuild electron

      - name: Verify electron dist
        run: |
          dist="$(node -p "path.resolve(path.dirname(require.resolve('electron/package.json')), 'dist')")"
          echo "electron dist resolved: $dist"
          if [ -d "$dist" ] && [ -d "$dist/Electron.app" ]; then
            echo "Electron.app exists"
            "$dist/Electron.app/Contents/MacOS/Electron" --version 2>/dev/null || true
          else
            echo "ERROR: Electron.app not found in electron dist"
            echo "This usually means pnpm did not run electron's postinstall script."
            exit 1
          fi

      - name: Build and package
        id: build
        # continue-on-error = true 让后续步骤能上传日志，方便排查失败原因
        continue-on-error: true
        run: bash -x build.sh 2>&1 | tee build.log
        shell: bash

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 15

      - name: Check build result
        if: always()
        run: |
          echo "========== release directory =========="
          ls -lahR release/ 2>/dev/null || echo "(no release directory)"
          echo "========== matching *.dmg ============="
          ls -lah release/*.dmg 2>/dev/null || echo "(no .dmg found)"

      - name: Create Release and Upload .dmg
        # 仅构建成功时才上传
        if: steps.build.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release/*.dmg
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build failed — check log
        if: steps.build.outcome != 'success'
        run: |
          echo "============================================================"
          echo " BUIL.SH FAILED — download the build-log artifact for details"
          echo "============================================================"
          echo " Tail of build.log:"
          tail -100 build.log 2>/dev/null || true
          exit 1
